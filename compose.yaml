services:
  postgres:
    image: "postgres:18.3"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres -U postgres"]
      interval: "10s"
      timeout: "5s"
      retries: "5"
    volumes:
      - "postgres_data:/postgres:/var/lib/postgresql"

  otelcol:
    image: "otel/opentelemetry-collector-contrib:latest"
    ports:
      - "13133:13133"
      - "4318:4318"
      - "4317:4317"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:13133"]
      interval: "10s"
      timeout: "5s"
      retries: "3"
    volumes:
      - "./docker/otel/config.yaml:/etc/otelcol-contrib/config.yaml"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "7141:3000"
    volumes:
      - "grafana_data:/var/lib/grafana"

volumes:
  postgres_data:
  grafana_data:
